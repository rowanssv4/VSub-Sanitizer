name: Auto Fetch VPN Nodes

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  update-nodes:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push Changes
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        [ -f nodes.txt ] && git add nodes.txt || echo "nodes.txt not found"
        [ -f sub.txt ] && git add sub.txt || echo "sub.txt not found"
        [ -f report.txt ] && git add report.txt || echo "report.txt not found"
        
        export TZ="Asia/Taipei"
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自動更新節點列表及診斷報告 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push origin main --force)
