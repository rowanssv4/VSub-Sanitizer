name: VSub-Sanitizer Pipeline

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nodes:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1  

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Sanitizer Script
      run: python scraper.py

    - name: Commit and Push Changes
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        [ -f nodes.txt ] && git add nodes.txt || echo "⚠️ nodes.txt 未生成"
        [ -f sub.txt ] && git add sub.txt || echo "⚠️ sub.txt 未生成"
        [ -f report.txt ] && git add report.txt || echo "⚠️ report.txt 未生成"
        
        export TZ="Asia/Taipei"
        CURRENT_TIME=$(date +"%Y-%m-%d %H:%M:%S")
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自動更新訂閱池及清洗報告 ($CURRENT_TIME)" && git push origin main --force)
