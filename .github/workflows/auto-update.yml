name: Auto Fetch VPN Nodes

on:
  schedule:
    # 每天国际标准时间 00:00 和 12:00 各运行一次 (北京时间 08:00 和 20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发运行

jobs:
  update-nodes:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 部署 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 执行爬虫脚本
    - name: Run Scraper Script
      run: python scraper.py

    # 5. 将更新后的节点文件提交并推送到仓库
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add nodes.txt sub.txt
        # 只有在文件有变动时才提交，防止空提交报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自动更新节点列表 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push)
