name: Auto Fetch VPN Nodes

on:
  schedule:
    # 每天国际标准时间 00:00 和 12:00 各运行一次 (北京时间 08:00 和 20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许在 GitHub 页面上手动点击按钮触发运行

jobs:
  update-nodes:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # 允许拉取最新所有的提交历史
        fetch-depth: 0

    # 2. 部署 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 执行爬虫脚本
    - name: Run Scraper Script
      run: python scraper.py

    # 5. 将更新后的节点文件及报告提交并推送到仓库
    - name: Commit and Push Changes
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 核心修复步骤：在提交前先拉取远程最新变动，并以远程为准做变动的变基合并，避免冲突拒绝
        git pull --rebase origin main
        
        # 检查文件是否存在，防止未生成时报错
        [ -f nodes.txt ] && git add nodes.txt || echo "nodes.txt not found"
        [ -f sub.txt ] && git add sub.txt || echo "sub.txt not found"
        [ -f report.txt ] && git add report.txt || echo "report.txt not found"
        
        # 只有在文件有变动时才提交，防止空提交报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自动更新节点列表及诊断报告 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push origin main)
